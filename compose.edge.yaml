services:
  edge-proxy:
    image: nginx:1.29.5-alpine-slim@sha256:032dcd5e58c2a6e767fa8b7bbaa74554fd62e8fd5614fe4f019a05dfba7be8d9
    entrypoint: ["/usr/sbin/nginx"]
    command: ["-g", "daemon off;"]
    depends_on:
      control-plane:
        condition: service_healthy
        restart: true
      xray:
        condition: service_started
        restart: true
      wireguard-wstunnel:
        condition: service_started
        restart: true
    restart: unless-stopped
    ports:
      - "${KET_EDGE_BIND_ADDRESS:-0.0.0.0}:${KET_EDGE_PUBLIC_PORT:-443}:443/tcp"
    networks:
      - default
      - wireguard-control
    read_only: true
    tmpfs:
      - /var/cache/nginx:size=16m,mode=1777
      - /var/run:size=4m,mode=0755
      - /tmp:size=8m,mode=1777
    volumes:
      - ./packaging/server/nginx.conf:/etc/nginx/nginx.conf:ro
      - "${KET_HYSTERIA_TLS_DIR:-./secrets/tls}:/etc/nginx/tls:ro"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider --no-check-certificate https://127.0.0.1/healthz"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 5

networks:
  wireguard-control:
