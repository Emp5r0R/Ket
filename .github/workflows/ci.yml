name: Ket CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0
          components: rustfmt, clippy
      - run: cargo fmt --all -- --check
      - run: cargo test --locked --workspace --exclude ket-desktop
      - run: cargo clippy --locked --workspace --exclude ket-desktop --all-targets --all-features -- -D warnings

  desktop-ui:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: apps/ket-desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/ket-desktop/package-lock.json
      - run: npm ci
      - run: npm test -- --run
      - run: npm run build

  desktop-native:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            libxdo-dev patchelf
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/ket-desktop/package-lock.json
      - run: npm ci
        working-directory: apps/ket-desktop
      - run: cargo check --locked -p ket-desktop

  desktop-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/ket-desktop/package-lock.json
      - run: npm ci
        working-directory: apps/ket-desktop
      - run: cargo check --locked -p ket-desktop

  android:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: apps/ket-android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"
      - run: ./gradlew --no-daemon assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: ket-android-debug
          path: apps/ket-android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  container:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: bash -n packaging/validate-env.sh
      - run: KET_ADMIN_TOKEN=01234567890123456789012345678901 KET_SESSION_TTL_SECONDS=1800 KET_MAX_SESSIONS=100 KET_COUNTRY_CODE=US ./packaging/validate-env.sh
      - run: docker build --pull --tag ket-control-plane:ci .
      - run: docker image inspect ket-control-plane:ci
