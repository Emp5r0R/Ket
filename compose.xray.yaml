services:
  control-plane:
    environment:
      KET_XRAY_CONFIG_PATH: /var/lib/ket-dataplane/xray.json
      KET_XRAY_BINARY: /usr/local/bin/xray
      KET_XRAY_API_SERVER: xray:10085
      KET_XRAY_API_LISTEN: 0.0.0.0
      KET_XRAY_API_PORT: 10085
      KET_XRAY_LISTEN_HOST: 0.0.0.0
      KET_XRAY_LISTEN_PORT: 8444
    volumes:
      - ket-dataplane:/var/lib/ket-dataplane

  xray:
    image: ghcr.io/xtls/xray-core:26.3.27@sha256:592ec4d11f656db95598d01e76dbcc6e002d67360b96a5436500a938230f52c7
    user: "10001:10001"
    command: ["run", "-c", "/var/lib/ket-dataplane/xray.json"]
    depends_on:
      control-plane:
        condition: service_healthy
        restart: true
    restart: unless-stopped
    ports:
      - "${KET_XRAY_BIND_ADDRESS:-0.0.0.0}:${KET_XRAY_PUBLIC_PORT:-443}:8444/tcp"
    volumes:
      - ket-dataplane:/var/lib/ket-dataplane:ro
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

volumes:
  ket-dataplane:
