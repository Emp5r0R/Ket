name: Ket CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          components: rustfmt, clippy
      - run: cargo fmt --all -- --check
      - run: cargo test --locked --workspace --exclude ket-desktop
      - run: cargo clippy --locked --workspace --exclude ket-desktop --all-targets --all-features -- -D warnings

  desktop-ui:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: apps/ket-desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/ket-desktop/package-lock.json
      - run: npm ci
      - run: npm test -- --run
      - run: npm run build

  desktop-native:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            libxdo-dev patchelf
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/ket-desktop/package-lock.json
      - run: npm ci
        working-directory: apps/ket-desktop
      - run: cargo check --locked -p ket-desktop

  linux-package:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            libxdo-dev patchelf
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/ket-desktop/package-lock.json
      - run: npm ci
        working-directory: apps/ket-desktop
      - run: cargo build --locked -p ket-tunnel-service --release
      - run: ./packaging/fetch-hysteria.sh linux-amd64 apps/ket-desktop/src-tauri/binaries/hysteria
      - run: ./packaging/fetch-xray.sh linux-amd64 apps/ket-desktop/src-tauri/binaries/xray
      - run: ./packaging/fetch-tun2proxy.sh linux-amd64 apps/ket-desktop/src-tauri/binaries/tun2proxy
      - run: KET_TEST_XRAY_BINARY=apps/ket-desktop/src-tauri/binaries/xray cargo test --locked -p ket-client-core xray::tests::pinned_xray_binary_accepts_rendered_config_when_supplied
      - run: ./packaging/validate-desktop-assets.sh linux
      - run: npm exec tauri build -- --bundles deb
        working-directory: apps/ket-desktop
      - uses: actions/upload-artifact@v4
        with:
          name: ket-linux-deb
          path: target/release/bundle/deb/*.deb
          if-no-files-found: error

  desktop-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/ket-desktop/package-lock.json
      - run: npm ci
        working-directory: apps/ket-desktop
      - run: cargo check --locked -p ket-desktop

  windows-package:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/ket-desktop/package-lock.json
      - run: npm ci
        working-directory: apps/ket-desktop
      - run: cargo build --locked -p ket-tunnel-service --release
      - shell: bash
        run: ./packaging/fetch-hysteria.sh windows-amd64 apps/ket-desktop/src-tauri/binaries/hysteria.exe
      - shell: bash
        run: ./packaging/fetch-xray.sh windows-amd64 apps/ket-desktop/src-tauri/binaries/xray.exe
      - shell: bash
        run: ./packaging/fetch-tun2proxy.sh windows-amd64 apps/ket-desktop/src-tauri/binaries/tun2proxy.exe apps/ket-desktop/src-tauri/binaries/wintun.dll
      - shell: bash
        run: KET_TEST_XRAY_BINARY=apps/ket-desktop/src-tauri/binaries/xray.exe cargo test --locked -p ket-client-core xray::tests::pinned_xray_binary_accepts_rendered_config_when_supplied
      - shell: bash
        run: ./packaging/validate-desktop-assets.sh windows
      - run: npm exec tauri build -- --bundles nsis --config src-tauri/tauri.nsis.conf.json
        working-directory: apps/ket-desktop
      - uses: actions/upload-artifact@v4
        with:
          name: ket-windows-nsis
          path: target/release/bundle/nsis/*.exe
          if-no-files-found: error

  android:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: apps/ket-android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;27.3.13750724"
      - run: ../../packaging/prepare-android-engines.sh app
      - run: ./gradlew --no-daemon testDebugUnitTest assembleDebug lintDebug
      - run: ../../packaging/validate-android-apk.sh app/build/outputs/apk/debug/app-debug.apk
      - uses: actions/upload-artifact@v4
        with:
          name: ket-android-debug
          path: apps/ket-android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  container:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: bash -n packaging/validate-env.sh
      - run: bash -n packaging/build-multiarch.sh
      - run: KET_ADMIN_TOKEN=01234567890123456789012345678901 KET_SESSION_TTL_SECONDS=1800 KET_MAX_SESSIONS=100 KET_COUNTRY_CODE=US ./packaging/validate-env.sh
      - name: Validate VLESS + REALITY environment
        run: >-
          KET_ADMIN_TOKEN=01234567890123456789012345678901
          KET_SESSION_TTL_SECONDS=1800
          KET_MAX_SESSIONS=100
          KET_COUNTRY_CODE=US
          KET_XRAY_ENABLED=true
          KET_XRAY_PUBLIC_HOST=vpn.example.test
          KET_XRAY_PUBLIC_PORT=443
          KET_XRAY_SNI=www.cloudflare.com
          KET_XRAY_SERVER_NAMES=www.cloudflare.com
          KET_XRAY_REALITY_TARGET=www.cloudflare.com:443
          KET_XRAY_PRIVATE_KEY=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
          KET_XRAY_PUBLIC_KEY=BBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBB
          KET_XRAY_SHORT_ID=0123456789abcdef
          KET_XRAY_CREDENTIAL_KEY=credential-key-with-at-least-32-characters
          ./packaging/validate-env.sh
      - run: cp .env.example .env
      - run: docker compose -f compose.yaml -f compose.hysteria.yaml config --quiet
      - run: docker compose -f compose.yaml -f compose.xray.yaml config --quiet
      - run: docker build --pull --tag ket-control-plane:ci .
      - run: docker run --rm --entrypoint /usr/local/bin/xray ket-control-plane:ci version
      - run: docker image inspect ket-control-plane:ci
