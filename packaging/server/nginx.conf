worker_processes auto;
user nginx;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
}

stream {
    map $ssl_preread_server_name $ket_tls_upstream {
        ${KET_XRAY_SNI} ket_reality;
        default ket_https;
    }

    upstream ket_https {
        server 127.0.0.1:8448;
    }

    upstream ket_reality {
        server xray:8444;
    }

    server {
        listen 443;
        listen [::]:443;
        proxy_connect_timeout 5s;
        proxy_timeout 1h;
        proxy_pass $ket_tls_upstream;
        ssl_preread on;
    }
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    resolver 127.0.0.11 ipv6=off valid=30s;
    server_tokens off;
    access_log off;
    error_log /dev/stderr warn;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    upstream ket_control {
        server control-plane:8787;
        keepalive 32;
    }

    upstream ket_xhttp {
        server xray:8445;
        keepalive 32;
    }

    server {
        listen 127.0.0.1:8448 ssl;
        http2 on;

        ssl_certificate /etc/nginx/tls/fullchain.pem;
        ssl_certificate_key /etc/nginx/tls/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_session_cache shared:KetTLS:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        client_max_body_size 32k;
        keepalive_timeout 65s;

        location ^~ /internal {
            return 404;
        }

        # The engines still enforce the complete random path issued by Ket.
        location ^~ /ket-xhttp- {
            # Xray packet-up permits 1 MiB POST bodies by default.
            client_max_body_size 2m;
            proxy_pass http://ket_xhttp;
            proxy_http_version 1.1;
            proxy_request_buffering off;
            proxy_buffering off;
            proxy_read_timeout 1h;
            proxy_send_timeout 1h;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location ^~ /ket-wg- {
            set $ket_wireguard_upstream wireguard-wstunnel:8080;
            proxy_pass http://$ket_wireguard_upstream;
            proxy_http_version 1.1;
            proxy_read_timeout 1h;
            proxy_send_timeout 1h;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        location / {
            proxy_pass http://ket_control;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
