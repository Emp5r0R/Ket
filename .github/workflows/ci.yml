name: Ket CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-24.04
    outputs:
      rust: ${{ steps.classify.outputs.rust }}
      desktop_ui: ${{ steps.classify.outputs.desktop_ui }}
      desktop_native: ${{ steps.classify.outputs.desktop_native }}
      linux_package: ${{ steps.classify.outputs.linux_package }}
      desktop_windows: ${{ steps.classify.outputs.desktop_windows }}
      windows_package: ${{ steps.classify.outputs.windows_package }}
      android: ${{ steps.classify.outputs.android }}
      container: ${{ steps.classify.outputs.container }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Select affected jobs
        id: classify
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [[ "$EVENT_NAME" == workflow_dispatch ]]; then
            .github/scripts/ci-changes.sh --all >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$EVENT_NAME" == pull_request ]]; then
            base="$BASE_SHA"
          else
            base="$BEFORE_SHA"
          fi

          if [[ -z "$base" || "$base" =~ ^0+$ ]] || ! git cat-file -e "$base^{commit}"; then
            .github/scripts/ci-changes.sh --all >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git diff --name-only -z "$base" "$HEAD_SHA" \
            | .github/scripts/ci-changes.sh --null >> "$GITHUB_OUTPUT"

  rust:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          components: rustfmt, clippy
      - run: cargo fmt --all -- --check
      - run: cargo test --locked --workspace --exclude ket-desktop
      - run: cargo clippy --locked --workspace --exclude ket-desktop --all-targets --all-features -- -D warnings

  desktop-ui:
    needs: changes
    if: needs.changes.outputs.desktop_ui == 'true'
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: apps/ket-desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/ket-desktop/package-lock.json
      - run: npm ci
      - run: npm test -- --run
      - run: npm run build

  desktop-native:
    needs: changes
    if: needs.changes.outputs.desktop_native == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            libxdo-dev patchelf
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/ket-desktop/package-lock.json
      - run: npm ci
        working-directory: apps/ket-desktop
      - name: Test optimized Linux desktop and patched glib iterator
        run: cargo test --locked --release -p ket-desktop --lib

  linux-package:
    needs: changes
    if: needs.changes.outputs.linux_package == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            build-essential libcap-ng-dev libssl-dev libxdo-dev patchelf pkg-config
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/ket-desktop/package-lock.json
      - run: npm ci
        working-directory: apps/ket-desktop
      - run: cargo build --locked -p ket-tunnel-service --release
      - run: ./packaging/fetch-hysteria.sh linux-amd64 apps/ket-desktop/src-tauri/binaries/hysteria
      - run: ./packaging/fetch-openvpn.sh linux-amd64 apps/ket-desktop/src-tauri/binaries/openvpn
      - run: ./packaging/fetch-shadowsocks.sh linux-amd64 apps/ket-desktop/src-tauri/binaries/sslocal
      - run: ./packaging/fetch-stunnel.sh linux-amd64 apps/ket-desktop/src-tauri/binaries/stunnel
      - run: ./packaging/fetch-xray.sh linux-amd64 apps/ket-desktop/src-tauri/binaries/xray
      - run: ./packaging/fetch-wstunnel.sh linux-amd64 apps/ket-desktop/src-tauri/binaries/wstunnel
      - run: ./packaging/fetch-tun2proxy.sh linux-amd64 apps/ket-desktop/src-tauri/binaries/tun2proxy
      - run: KET_TEST_XRAY_BINARY=apps/ket-desktop/src-tauri/binaries/xray cargo test --locked -p ket-client-core xray::tests::pinned_xray_binary_accepts_rendered_config_when_supplied
      - run: KET_TEST_XRAY_BINARY=apps/ket-desktop/src-tauri/binaries/xray cargo test --locked -p ket-client-core wireguard::tests::pinned_xray_binary_accepts_wireguard_config_when_supplied
      - run: KET_TEST_SHADOWSOCKS_LOCAL_BINARY=apps/ket-desktop/src-tauri/binaries/sslocal cargo test --locked -p ket-client-core shadowsocks::tests::pinned_sslocal_accepts_rendered_config_when_supplied
      - run: ./packaging/validate-desktop-assets.sh linux
      - run: npm exec tauri build -- --bundles deb
        working-directory: apps/ket-desktop
      - name: Verify clean install, reinstall, removal, and purge
        run: >-
          sudo env
          KET_PACKAGE_TEST_ALLOW_HOST_MUTATION=1
          KET_PACKAGE_TEST_USER="$USER"
          ./packaging/verify-linux-deb.sh
          target/release/bundle/deb/*.deb
      - uses: actions/upload-artifact@v4
        with:
          name: ket-linux-deb
          path: target/release/bundle/deb/*.deb
          if-no-files-found: error

  desktop-windows:
    needs: changes
    if: needs.changes.outputs.desktop_windows == 'true'
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/ket-desktop/package-lock.json
      - run: npm ci
        working-directory: apps/ket-desktop
      - run: cargo check --locked -p ket-desktop

  windows-package:
    needs: changes
    if: needs.changes.outputs.windows_package == 'true'
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/ket-desktop/package-lock.json
      - run: npm ci
        working-directory: apps/ket-desktop
      - run: cargo build --locked -p ket-tunnel-service --release
      - shell: bash
        run: ./packaging/fetch-hysteria.sh windows-amd64 apps/ket-desktop/src-tauri/binaries/hysteria.exe
      - shell: bash
        run: ./packaging/fetch-openvpn.sh windows-amd64 apps/ket-desktop/src-tauri/binaries/openvpn
      - shell: bash
        run: ./packaging/fetch-shadowsocks.sh windows-amd64 apps/ket-desktop/src-tauri/binaries/sslocal.exe
      - shell: bash
        run: ./packaging/fetch-stunnel.sh windows-amd64 apps/ket-desktop/src-tauri/binaries/stunnel
      - shell: bash
        run: ./packaging/fetch-xray.sh windows-amd64 apps/ket-desktop/src-tauri/binaries/xray.exe
      - shell: bash
        run: ./packaging/fetch-wstunnel.sh windows-amd64 apps/ket-desktop/src-tauri/binaries/wstunnel.exe
      - shell: bash
        run: ./packaging/fetch-tun2proxy.sh windows-amd64 apps/ket-desktop/src-tauri/binaries/tun2proxy.exe apps/ket-desktop/src-tauri/binaries/wintun.dll
      - shell: bash
        run: cp apps/ket-desktop/src-tauri/binaries/wintun.dll apps/ket-desktop/src-tauri/binaries/openvpn/wintun.dll
      - shell: bash
        run: KET_TEST_XRAY_BINARY=apps/ket-desktop/src-tauri/binaries/xray.exe cargo test --locked -p ket-client-core xray::tests::pinned_xray_binary_accepts_rendered_config_when_supplied
      - shell: bash
        run: KET_TEST_XRAY_BINARY=apps/ket-desktop/src-tauri/binaries/xray.exe cargo test --locked -p ket-client-core wireguard::tests::pinned_xray_binary_accepts_wireguard_config_when_supplied
      - shell: bash
        run: KET_TEST_SHADOWSOCKS_LOCAL_BINARY=apps/ket-desktop/src-tauri/binaries/sslocal.exe cargo test --locked -p ket-client-core shadowsocks::tests::pinned_sslocal_accepts_rendered_config_when_supplied
      - shell: bash
        run: ./packaging/validate-desktop-assets.sh windows
      - run: npm exec tauri build -- --bundles nsis --config src-tauri/tauri.nsis.conf.json
        working-directory: apps/ket-desktop
      - name: Verify install, reinstall, service, and uninstall
        shell: powershell
        env:
          KET_PACKAGE_TEST_ALLOW_HOST_MUTATION: "1"
        run: |
          $installer = Get-ChildItem target/release/bundle/nsis/*.exe -File
          if ($installer.Count -ne 1) { throw "Expected exactly one NSIS installer" }
          ./packaging/verify-windows-nsis.ps1 -Installer $installer.FullName
      - uses: actions/upload-artifact@v4
        with:
          name: ket-windows-nsis
          path: target/release/bundle/nsis/*.exe
          if-no-files-found: error

  android:
    needs: changes
    if: needs.changes.outputs.android == 'true'
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: apps/ket-android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
          cache-dependency-path: apps/ket-android/**/*.gradle*
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;27.3.13750724"
      - run: ../../packaging/prepare-android-engines.sh app
      - name: Generate disposable release-signing identity
        shell: bash
        run: |
          set -euo pipefail
          keystore="$RUNNER_TEMP/ket-ci-release.p12"
          password="ket-ci-release-password"
          alias="ket-ci"
          keytool -genkeypair -noprompt \
            -keystore "$keystore" \
            -storetype PKCS12 \
            -storepass "$password" \
            -keypass "$password" \
            -alias "$alias" \
            -keyalg RSA \
            -keysize 3072 \
            -validity 2 \
            -dname "CN=Ket CI Ephemeral, O=Ket, C=XX"
          cert_sha256=$(keytool -list -v \
            -keystore "$keystore" \
            -storepass "$password" \
            -alias "$alias" | awk '/SHA256:/{gsub(":", "", $2); print $2; exit}')
          test "${#cert_sha256}" -eq 64
          {
            echo "KET_ANDROID_KEYSTORE=$keystore"
            echo "KET_ANDROID_KEYSTORE_PASSWORD=$password"
            echo "KET_ANDROID_KEY_ALIAS=$alias"
            echo "KET_ANDROID_KEY_PASSWORD=$password"
            echo "KET_ANDROID_CERT_SHA256=$cert_sha256"
          } >> "$GITHUB_ENV"
      - run: ./gradlew --no-daemon testDebugUnitTest assembleDebug lintDebug assembleRelease
      - run: APKSIGNER="$ANDROID_HOME/build-tools/34.0.0/apksigner" ../../packaging/validate-android-apk.sh app/build/outputs/apk/debug/app-debug.apk
      - run: APKSIGNER="$ANDROID_HOME/build-tools/34.0.0/apksigner" ../../packaging/validate-android-apk.sh --expected-cert-sha256 "$KET_ANDROID_CERT_SHA256" app/build/outputs/apk/release/app-release.apk
      - uses: actions/upload-artifact@v4
        with:
          name: ket-android-debug
          path: apps/ket-android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  container:
    needs: changes
    if: needs.changes.outputs.container == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: bash -n packaging/validate-env.sh
      - run: bash -n packaging/build-multiarch.sh
      - run: bash -n packaging/install-server.sh packaging/server/*.sh
      - run: ./packaging/test-install-server.sh
      - run: KET_ADMIN_TOKEN=01234567890123456789012345678901 KET_SESSION_TTL_SECONDS=1800 KET_MAX_SESSIONS=100 KET_COUNTRY_CODE=US ./packaging/validate-env.sh
      - name: Validate VLESS + REALITY environment
        run: >-
          KET_ADMIN_TOKEN=01234567890123456789012345678901
          KET_SESSION_TTL_SECONDS=1800
          KET_MAX_SESSIONS=100
          KET_COUNTRY_CODE=US
          KET_XRAY_ENABLED=true
          KET_XRAY_PUBLIC_HOST=vpn.example.test
          KET_XRAY_PUBLIC_PORT=443
          KET_XRAY_SNI=www.cloudflare.com
          KET_XRAY_SERVER_NAMES=www.cloudflare.com
          KET_XRAY_REALITY_TARGET=www.cloudflare.com:443
          KET_XRAY_PRIVATE_KEY=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
          KET_XRAY_PUBLIC_KEY=BBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBB
          KET_XRAY_SHORT_ID=0123456789abcdef
          KET_XRAY_CREDENTIAL_KEY=credential-key-with-at-least-32-characters
          ./packaging/validate-env.sh
      - name: Validate HTTPS Stealth environment
        run: >-
          KET_ADMIN_TOKEN=01234567890123456789012345678901
          KET_SESSION_TTL_SECONDS=1800
          KET_MAX_SESSIONS=100
          KET_COUNTRY_CODE=US
          KET_XHTTP_ENABLED=true
          KET_XHTTP_PUBLIC_HOST=stealth.example.test
          KET_XHTTP_PUBLIC_PORT=443
          KET_XHTTP_SNI=stealth.example.test
          KET_XHTTP_PATH=/ket-a1b2c3d4e5f6a1b2c3d4e5f6
          KET_XHTTP_ORIGIN_BIND_ADDRESS=127.0.0.1
          KET_XHTTP_ORIGIN_PORT=8445
          KET_XRAY_CREDENTIAL_KEY=credential-key-with-at-least-32-characters
          ./packaging/validate-env.sh
      - name: Validate OpenVPN over stunnel environment
        run: |
          set -euo pipefail
          pki="$RUNNER_TEMP/openvpn-pki"
          tls="$RUNNER_TEMP/openvpn-stunnel-tls"
          mkdir -p "$pki" "$tls"
          printf '%s\n' '-----BEGIN CERTIFICATE-----' TEST '-----END CERTIFICATE-----' > "$pki/ca.crt"
          cp "$pki/ca.crt" "$pki/stunnel-ca.crt"
          cp "$pki/ca.crt" "$pki/server.crt"
          printf '%s\n' '-----BEGIN PRIVATE KEY-----' TEST '-----END PRIVATE KEY-----' > "$pki/server.key"
          printf '%s\n' '-----BEGIN OpenVPN Static key V1-----' TEST '-----END OpenVPN Static key V1-----' > "$pki/tls-crypt.key"
          cp "$pki/ca.crt" "$tls/fullchain.pem"
          cp "$pki/server.key" "$tls/privkey.pem"
          KET_ADMIN_TOKEN=01234567890123456789012345678901 \
          KET_SESSION_TTL_SECONDS=1800 \
          KET_MAX_SESSIONS=100 \
          KET_COUNTRY_CODE=US \
          KET_OPENVPN_ENABLED=true \
          KET_OPENVPN_PUBLIC_HOST=openvpn.example.test \
          KET_OPENVPN_PUBLIC_PORT=443 \
          KET_OPENVPN_SNI=openvpn.example.test \
          KET_OPENVPN_MANAGER_TOKEN=manager-token-with-at-least-32-characters \
          KET_OPENVPN_AUTH_TOKEN=auth-token-with-at-least-32-characters \
          KET_OPENVPN_PKI_DIR="$pki" \
          KET_OPENVPN_STUNNEL_TLS_DIR="$tls" \
          ./packaging/validate-env.sh
      - run: cp .env.example .env
      - run: docker compose -f compose.yaml -f compose.hysteria.yaml config --quiet
      - run: docker compose -f compose.yaml -f compose.xray.yaml config --quiet
      - run: docker compose -f compose.yaml -f compose.xhttp.yaml config --quiet
      - run: docker compose -f compose.yaml -f compose.openvpn.yaml config --quiet
      - run: docker compose -f compose.yaml -f compose.xray.yaml -f compose.xhttp.yaml config --quiet
      - run: docker build --pull --tag ket-control-plane:ci .
      - run: docker run --rm --entrypoint /usr/local/bin/xray ket-control-plane:ci version
      - run: docker run --rm --entrypoint /usr/local/bin/openvpn ket-control-plane:ci --version
      - run: docker run --rm --entrypoint /usr/local/bin/stunnel ket-control-plane:ci -version
      - run: docker image inspect ket-control-plane:ci
