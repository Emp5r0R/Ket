services:
  control-plane:
    environment:
      KET_WIREGUARD_MANAGER_URL: http://wireguard-agent:8788
    networks:
      - default
      - wireguard-control
    depends_on:
      wireguard-agent:
        condition: service_healthy
        restart: true

  wireguard-agent:
    image: ket-control-plane:local
    user: "0:0"
    entrypoint: ["/usr/local/bin/ket-wireguard-agent"]
    env_file:
      - .env
    environment:
      KET_WIREGUARD_AGENT_BIND: 0.0.0.0:8788
      KET_WIREGUARD_EGRESS_INTERFACE: eth0
      KET_WIREGUARD_LISTEN_PORT: 51820
      KET_WIREGUARD_MAX_PEERS: ${KET_MAX_SESSIONS:-1000}
    cap_add:
      - NET_ADMIN
    restart: unless-stopped
    networks:
      - wireguard-control
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
      - /run:size=4m,mode=0755
    security_opt:
      - no-new-privileges:true
    sysctls:
      net.ipv4.ip_forward: "1"
    healthcheck:
      test:
        - CMD-SHELL
        - 'curl --fail --silent --show-error -H "Authorization: Bearer $$KET_WIREGUARD_MANAGER_TOKEN" http://127.0.0.1:8788/healthz'
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 5

  wireguard-wstunnel:
    image: ket-control-plane:local
    user: "10001:10001"
    entrypoint: ["/usr/local/bin/wstunnel"]
    environment:
      NO_COLOR: "true"
    command:
      - server
      - --no-color
      - --log-lvl
      - WARN
      - --restrict-to
      - wireguard-agent:51820
      - --restrict-http-upgrade-path-prefix
      - ${KET_WIREGUARD_WS_PATH_PREFIX:?KET_WIREGUARD_WS_PATH_PREFIX is required}
      - ws://0.0.0.0:8080
    depends_on:
      wireguard-agent:
        condition: service_healthy
        restart: true
    restart: unless-stopped
    ports:
      - "${KET_WIREGUARD_ORIGIN_BIND_ADDRESS:-127.0.0.1}:${KET_WIREGUARD_ORIGIN_PORT:-8446}:8080/tcp"
    networks:
      - wireguard-control
    read_only: true
    tmpfs:
      - /tmp:size=8m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      disable: true

networks:
  wireguard-control:
